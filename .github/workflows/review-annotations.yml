name: Review Annotations

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review-automation-smoke:
    name: review automation smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run local review automation smoke
        run: node .github/scripts/smoke-review-automation.cjs

  reviewdog:
    name: reviewdog diagnostics
    if: github.event_name == 'pull_request'
    needs: review-automation-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      checks: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: reviewdog/action-setup@d8edfce3dd5e1ec6978745e801f9c50b5ef80252 # v1.4.0
        with:
          reviewdog_version: v0.21.0
      - name: Generate SpotNote diagnostics
        run: |
          bash .github/reviewdog/spotnote-diagnostics.sh > reviewdog-diagnostics.txt
          if [ -s reviewdog-diagnostics.txt ]; then
            cat reviewdog-diagnostics.txt
          else
            echo "reviewdog diagnostics: no findings"
          fi
      - name: Publish reviewdog diagnostics
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          reviewdog \
            -name="spotnote-reviewdog" \
            -efm="%f:%l:%c: %m" \
            -level=warning \
            -reporter=github-pr-check \
            -filter-mode=nofilter \
            -fail-level=none \
            < reviewdog-diagnostics.txt

  danger:
    name: Danger policy comments
    if: github.event_name == 'pull_request'
    needs: review-automation-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: danger/danger-js@67ed2c1f42fd2fc198cc3c14b43c8f83351f4fe9 # 13.0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
